<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>blue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Crimson+Text&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/blue.css">
</head>
<body class="blue-page">
  <div class="metal-puzzles" aria-hidden="true">
    <div class="metal-puzzle mp1" title="dwa zaplątane pierścienie">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="chr1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"  stop-color="#f3f7fb" stop-opacity="0.95"/>
            <stop offset="35%" stop-color="#c2d0de" stop-opacity="0.85"/>
            <stop offset="65%" stop-color="#7c91a6" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#2f3e50" stop-opacity="0.5"/>
          </linearGradient>
        </defs>
        <circle cx="38" cy="50" r="26" fill="none" stroke="url(#chr1)" stroke-width="6"/>
        <circle cx="62" cy="50" r="26" fill="none" stroke="url(#chr1)" stroke-width="6"/>
        <path d="M 60 28 A 26 26 0 0 1 64 72" fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="7"/>
        <path d="M 60 28 A 26 26 0 0 1 64 72" fill="none" stroke="url(#chr1)" stroke-width="5"/>
        <circle cx="32" cy="40" r="22" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
        <circle cx="56" cy="40" r="22" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
      </svg>
    </div>

    <div class="metal-puzzle mp2" title="zaplątane figury ósemki">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="chr2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"  stop-color="#f3f7fb" stop-opacity="0.95"/>
            <stop offset="35%" stop-color="#c2d0de" stop-opacity="0.85"/>
            <stop offset="65%" stop-color="#7c91a6" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#2f3e50" stop-opacity="0.5"/>
          </linearGradient>
        </defs>
        <path d="M 8 50 C 8 32 28 32 32 50 C 36 68 56 68 60 50 C 64 32 84 32 88 50 C 90 60 86 66 80 67"
              fill="none" stroke="url(#chr2)" stroke-width="6.5" stroke-linecap="round"/>
        <path d="M 12 67 C 16 68 22 64 24 50 C 28 32 48 32 52 50 C 56 68 76 68 80 50 C 84 32 92 35 92 50"
              fill="none" stroke="url(#chr2)" stroke-width="6.5" stroke-linecap="round"/>
        <path d="M 32 50 C 36 68 56 68 60 50" fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="7"/>
        <path d="M 32 50 C 36 68 56 68 60 50" fill="none" stroke="url(#chr2)" stroke-width="5.5" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="metal-puzzle mp3" title="zaplątane szpilki U">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="chr3" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"  stop-color="#f3f7fb" stop-opacity="0.95"/>
            <stop offset="35%" stop-color="#c2d0de" stop-opacity="0.85"/>
            <stop offset="65%" stop-color="#7c91a6" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#2f3e50" stop-opacity="0.5"/>
          </linearGradient>
        </defs>
        <!-- U1: skierowana w dół, lewa -->
        <path d="M 18 80 L 18 38 Q 18 22 33 22 Q 48 22 48 38 L 48 80"
              fill="none" stroke="url(#chr3)" stroke-width="6.5" stroke-linecap="round"/>
        <!-- U2: skierowana w górę, środek (przeplata U1) -->
        <path d="M 30 14 L 30 56 Q 30 72 45 72 Q 60 72 60 56 L 60 14"
              fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="7.5" stroke-linecap="round"/>
        <path d="M 30 14 L 30 56 Q 30 72 45 72 Q 60 72 60 56 L 60 14"
              fill="none" stroke="url(#chr3)" stroke-width="6" stroke-linecap="round"/>
        <!-- U3: skierowana w dół, prawa (przeplata U2) -->
        <path d="M 56 80 L 56 38 Q 56 22 71 22 Q 86 22 86 38 L 86 80"
              fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="7.5" stroke-linecap="round"/>
        <path d="M 56 80 L 56 38 Q 56 22 71 22 Q 86 22 86 38 L 86 80"
              fill="none" stroke="url(#chr3)" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="metal-puzzle mp4" title="klatka z kulą i prętami">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="chr4" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"  stop-color="#f3f7fb" stop-opacity="0.95"/>
            <stop offset="35%" stop-color="#c2d0de" stop-opacity="0.85"/>
            <stop offset="65%" stop-color="#7c91a6" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#2f3e50" stop-opacity="0.5"/>
          </linearGradient>
          <radialGradient id="ball4" cx="35%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="#a5b8cc" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#34465a" stop-opacity="0.85"/>
          </radialGradient>
        </defs>
        <!-- pręty z tyłu -->
        <line x1="38" y1="22" x2="38" y2="82" stroke="url(#chr4)" stroke-width="2.5" opacity="0.6"/>
        <line x1="50" y1="22" x2="50" y2="82" stroke="url(#chr4)" stroke-width="2.5" opacity="0.55"/>
        <line x1="62" y1="22" x2="62" y2="82" stroke="url(#chr4)" stroke-width="2.5" opacity="0.6"/>
        <!-- kula i ramiona -->
        <line x1="50" y1="52" x2="22" y2="52" stroke="url(#chr4)" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="50" y1="52" x2="78" y2="52" stroke="url(#chr4)" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="50" y1="52" x2="34" y2="36" stroke="url(#chr4)" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="50" y1="52" x2="66" y2="36" stroke="url(#chr4)" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="50" y1="52" x2="50" y2="32" stroke="url(#chr4)" stroke-width="3.2" stroke-linecap="round"/>
        <circle cx="50" cy="52" r="9" fill="url(#ball4)"/>
        <!-- pręty z przodu -->
        <line x1="22" y1="22" x2="22" y2="82" stroke="url(#chr4)" stroke-width="3.2"/>
        <line x1="78" y1="22" x2="78" y2="82" stroke="url(#chr4)" stroke-width="3.2"/>
        <!-- pierścienie góra/dół -->
        <ellipse cx="50" cy="22" rx="30" ry="5.5" fill="none" stroke="url(#chr4)" stroke-width="3.2"/>
        <ellipse cx="50" cy="82" rx="30" ry="6" fill="none" stroke="url(#chr4)" stroke-width="3.5"/>
        <ellipse cx="50" cy="82" rx="30" ry="6" fill="rgba(80, 95, 115, 0.4)"/>
      </svg>
    </div>
  </div>

  <div class="blue-circle-bg" aria-hidden="true">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="0.4" stroke-dasharray="1 2"/>
      <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="0.3"/>
      <line x1="50" y1="4" x2="50" y2="96" stroke="currentColor" stroke-width="0.2" stroke-dasharray="1 3"/>
      <line x1="4" y1="50" x2="96" y2="50" stroke="currentColor" stroke-width="0.2" stroke-dasharray="1 3"/>
    </svg>
  </div>

  <main>
    <section class="blue-board">
      <p class="blue-message">Kółko da wam rozwiązanie.</p>
      <span class="blue-stamp">Dowód №3</span>

      <form class="blue-input-section" id="weightForm" autocomplete="off">
        <input
          class="blue-input"
          id="weightInput"
          type="number"
          inputmode="numeric"
          pattern="[0-9]*"
          min="0"
          max="9999"
          maxlength="4"
          aria-label="Wartość liczbowa"
        >
        <button type="submit" class="blue-check-btn">Sprawdź</button>
        <div class="blue-feedback" id="blueFeedback" aria-live="polite"></div>
      </form>

      <section class="blue-reveal" id="blueReveal" aria-live="polite">
        <h2 class="reveal-title">WASZA CYFRA TO…</h2>
        <div class="reveal-cipher" id="blueCipher"></div>
      </section>
    </section>
  </main>
  <script src="/js/global.js"></script>
  <script>
    (function () {
      const form = document.getElementById('weightForm');
      const input = document.getElementById('weightInput');
      const feedback = document.getElementById('blueFeedback');
      const reveal = document.getElementById('blueReveal');

      input.addEventListener('input', () => {
        if (input.value.length > 4) {
          input.value = input.value.slice(0, 4);
        }
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const raw = input.value.trim();
        const val = parseInt(raw, 10);
        if (!raw || Number.isNaN(val)) {
          feedback.textContent = 'Wpiszcie liczbę.';
          input.classList.remove('shake');
          void input.offsetWidth;
          input.classList.add('shake');
          return;
        }
        if (val >= 408 && val <= 432) {
          form.classList.add('hidden');
          reveal.classList.add('active');
          fetch('/api/cipher?group=blue')
            .then((r) => r.json())
            .then((d) => {
              const el = document.getElementById('blueCipher');
              if (el && d && d.digit) el.textContent = d.digit;
            })
            .catch(() => {});
        } else {
          feedback.textContent = 'Zły kod, spróbujcie ponownie.';
          input.classList.remove('shake');
          void input.offsetWidth;
          input.classList.add('shake');
          setTimeout(() => { input.value = ''; input.focus(); }, 600);
        }
      });
    })();
  </script>
</body>
</html>
